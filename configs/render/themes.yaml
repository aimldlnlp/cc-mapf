# Theme presets for visualization
# Usage in suite config: theme: vibrant_dark (or vibrant_light, cyberpunk, ocean_dark, etc.)

themes:
  # Default light theme
  light:
    background_color: "#FFFFFF"
    grid_color: "#D9D5CF"
    grid_linestyle: "-"
    grid_linewidth: 0.4
    obstacle_facecolor: "#D7D2C9"
    obstacle_edgecolor: "#B2ACA2"
    obstacle_linewidth: 0.4
    text_color: "#2C2C2C"
    axes_edgecolor: "#A9A39A"
    connectivity_edge_color: "#8A8883"
    connectivity_linestyle: "-"
    connectivity_linewidth: 0.7
    agent_edgecolor: "#55514B"
    agent_linewidth: 0.7
    goal_linestyle: ":"
    goal_linewidth: 0.9
    title_color: "#2C2C2C"
    subtitle_color: "#555555"
    glow_effect: false
    glow_radius: 0
    agent_size: 0.32

  # Dark theme
  dark:
    background_color: "#1A1A2E"
    grid_color: "#16213E"
    grid_linestyle: "-"
    grid_linewidth: 0.3
    obstacle_facecolor: "#0F3460"
    obstacle_edgecolor: "#1A4B7A"
    obstacle_linewidth: 0.5
    text_color: "#EAEAEA"
    axes_edgecolor: "#4A5568"
    connectivity_edge_color: "#48CAE4"
    connectivity_linestyle: "-"
    connectivity_linewidth: 1.0
    agent_edgecolor: "#FFFFFF"
    agent_linewidth: 1.0
    goal_linestyle: "--"
    goal_linewidth: 1.2
    title_color: "#EAEAEA"
    subtitle_color: "#B0B0B0"
    glow_effect: true
    glow_radius: 3
    agent_size: 0.35

  # Cyberpunk dark theme
  cyberpunk:
    background_color: "#0D0221"
    grid_color: "#1A0F3C"
    grid_linestyle: "--"
    grid_linewidth: 0.4
    obstacle_facecolor: "#261447"
    obstacle_edgecolor: "#FF3864"
    obstacle_linewidth: 0.6
    text_color: "#F72585"
    axes_edgecolor: "#7209B7"
    connectivity_edge_color: "#4CC9F0"
    connectivity_linestyle: "-"
    connectivity_linewidth: 1.2
    agent_edgecolor: "#FFFFFF"
    agent_linewidth: 1.2
    goal_linestyle: "-"
    goal_linewidth: 1.5
    title_color: "#F72585"
    subtitle_color: "#4CC9F0"
    glow_effect: true
    glow_radius: 5
    agent_size: 0.38

  # Ocean dark theme
  ocean_dark:
    background_color: "#001219"
    grid_color: "#003344"
    grid_linestyle: "-"
    grid_linewidth: 0.3
    obstacle_facecolor: "#005F73"
    obstacle_edgecolor: "#0A9396"
    obstacle_linewidth: 0.5
    text_color: "#E9D8A6"
    axes_edgecolor: "#94D2BD"
    connectivity_edge_color: "#CA6702"
    connectivity_linestyle: "-"
    connectivity_linewidth: 0.8
    agent_edgecolor: "#FFFFFF"
    agent_linewidth: 0.8
    goal_linestyle: ":"
    goal_linewidth: 1.0
    title_color: "#E9D8A6"
    subtitle_color: "#94D2BD"
    glow_effect: true
    glow_radius: 3
    agent_size: 0.35

  # High contrast theme (accessibility)
  high_contrast:
    background_color: "#FFFFFF"
    grid_color: "#000000"
    grid_linestyle: "-"
    grid_linewidth: 0.5
    obstacle_facecolor: "#808080"
    obstacle_edgecolor: "#000000"
    obstacle_linewidth: 0.8
    text_color: "#000000"
    axes_edgecolor: "#000000"
    connectivity_edge_color: "#000000"
    connectivity_linestyle: "-"
    connectivity_linewidth: 1.5
    agent_edgecolor: "#000000"
    agent_linewidth: 1.5
    goal_linestyle: "-"
    goal_linewidth: 2.0
    title_color: "#000000"
    subtitle_color: "#000000"
    glow_effect: false
    glow_radius: 0
    agent_size: 0.40
