name: benchmark_vibrant
families:
  - open
  - corridor
  - warehouse
  - formation_shift
scales:
  - width: 16
    height: 16
    agents: 4
  - width: 24
    height: 24
    agents: 8
  - width: 32
    height: 32
    agents: 12
seeds: [1, 2, 3, 4, 5]
planners:
  - connected_step
time_limit_s: 180.0
time_limit_s_by_scale:
  16x16_4a: 60.0
  24x24_8a: 180.0
  32x32_12a: 360.0
render:
  enabled: true
  preset: showcase
  font_family: DejaVu Sans
  font_weight: bold
  dpi: 160
  figsize: [6.0, 6.0]
  gif_fps: 4
  interpolation_steps: 3
  show_connectivity_edges: true
  # NEW: Vibrant palette
  palette_preset: vibrant
  # NEW: Dark theme with glow effects
  theme: dark
  glow_effect: true
  glow_radius: 3
  agent_size: 0.35
  snapshot_timestep_policy: middle
  annotation_style: minimal
output_root: artifacts/runs
