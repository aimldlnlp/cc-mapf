name: core
families:
  - open
  - corridor
  - warehouse
  - formation_shift
scales:
  - width: 16
    height: 16
    agents: 4
  - width: 24
    height: 24
    agents: 8
  - width: 32
    height: 32
    agents: 12
seeds: [1, 2, 3, 4, 5]
planners:
  - greedy
  - prioritized
  - cbs
  - connected_step
time_limit_s: 60.0
render:
  enabled: true
  preset: showcase
  font_family: DejaVu Serif
  font_weight: normal
  dpi: 160
  figsize: [6.0, 6.0]
  gif_fps: 4
  interpolation_steps: 3
  show_connectivity_edges: true
  palette:
    - "#4C5B61"
    - "#7D6B57"
    - "#819A91"
    - "#A67C52"
    - "#59788E"
    - "#B26E63"
    - "#8E9AAF"
    - "#7C9885"
  snapshot_timestep_policy: middle
  annotation_style: minimal
output_root: artifacts/runs
