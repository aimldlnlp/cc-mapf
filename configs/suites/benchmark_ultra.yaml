name: benchmark_ultra
families:
  - open
  - corridor
  - warehouse
  - formation_shift
scales:
  - width: 16
    height: 16
    agents: 4
  - width: 24
    height: 24
    agents: 8
  - width: 32
    height: 32
    agents: 12
seeds: [1, 2, 3, 4, 5]
planners:
  - connected_step
# Time limits: ultra-aggressive for maximum solve rate
time_limit_s: 180.0
time_limit_s_by_scale:
  16x16_4a: 60.0      # Easy, keep short
  24x24_8a: 300.0     # +2 min from 180s for the one failure case
  32x32_12a: 600.0    # +4 min from 360s for hard warehouse cases
render:
  enabled: true
  preset: showcase
  font_family: CMU Serif
  font_weight: normal
  dpi: 160
  figsize: [6.0, 6.0]
  gif_fps: 4
  interpolation_steps: 3
  show_connectivity_edges: true
  palette:
    - "#4C5B61"
    - "#7D6B57"
    - "#819A91"
    - "#A67C52"
    - "#59788E"
    - "#B26E63"
    - "#8E9AAF"
    - "#7C9885"
  snapshot_timestep_policy: middle
  annotation_style: minimal
output_root: artifacts/runs
