name: benchmark_academic
families:
  - open
  - corridor
  - warehouse
  - formation_shift
scales:
  - width: 16
    height: 16
    agents: 4
  - width: 24
    height: 24
    agents: 8
  - width: 32
    height: 32
    agents: 12
seeds: [1, 2, 3, 4, 5]
planners:
  - connected_step
time_limit_s: 180.0
time_limit_s_by_scale:
  16x16_4a: 60.0
  24x24_8a: 180.0
  32x32_12a: 360.0
render:
  enabled: true
  preset: showcase
  # Academic/Publication style
  font_family: DejaVu Serif
  font_weight: normal
  dpi: 300  # Print quality
  figsize: [6.0, 6.0]
  gif_fps: 4
  interpolation_steps: 3
  show_connectivity_edges: true
  # NEW: Academic palette - CMYK friendly
  palette_preset: academic
  # NEW: Academic theme - clean white paper style
  theme: academic
  glow_effect: false
  glow_radius: 0
  agent_size: 0.30
  snapshot_timestep_policy: middle
  annotation_style: minimal
output_root: artifacts/runs
