name: benchmark_enhanced
families:
  - open
  - corridor
  - warehouse
  - formation_shift
scales:
  - width: 16
    height: 16
    agents: 4
  - width: 24
    height: 24
    agents: 8
  - width: 32
    height: 32
    agents: 12
seeds: [1, 2, 3, 4, 5]
planners:
  - enhanced_connected_step  # NEW: Adaptive beam + portfolio + warehouse-opt
time_limit_s: 300.0  # Increased untuk portfolio attempts
time_limit_s_by_scale:
  16x16_4a: 120.0
  24x24_8a: 300.0
  32x32_12a: 600.0  # More time untuk large instances
render:
  enabled: true
  preset: showcase
  font_family: CMU Serif
  font_weight: normal
  dpi: 200
  figsize: [6.0, 6.0]
  gif_fps: 8
  interpolation_steps: 4
  show_connectivity_edges: true
  palette_preset: academic
  theme: academic
  glow_effect: false
  glow_radius: 0
  agent_size: 0.30
  snapshot_timestep_policy: middle
  annotation_style: minimal
output_root: artifacts/runs
