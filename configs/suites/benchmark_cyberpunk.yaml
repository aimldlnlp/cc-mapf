name: benchmark_cyberpunk
families:
  - open
  - corridor
  - warehouse
  - formation_shift
scales:
  - width: 16
    height: 16
    agents: 4
  - width: 24
    height: 24
    agents: 8
  - width: 32
    height: 32
    agents: 12
seeds: [1, 2, 3, 4, 5]
planners:
  - connected_step
time_limit_s: 180.0
time_limit_s_by_scale:
  16x16_4a: 60.0
  24x24_8a: 180.0
  32x32_12a: 360.0
render:
  enabled: true
  preset: showcase
  font_family: CMU Serif
  font_weight: normal
  dpi: 200
  figsize: [6.5, 6.5]
  gif_fps: 6
  interpolation_steps: 4
  show_connectivity_edges: true
  # NEW: Cyberpunk neon palette
  palette_preset: cyberpunk
  # NEW: Cyberpunk theme
  theme: cyberpunk
  glow_effect: true
  glow_radius: 5
  agent_size: 0.38
  snapshot_timestep_policy: middle
  annotation_style: minimal
output_root: artifacts/runs
